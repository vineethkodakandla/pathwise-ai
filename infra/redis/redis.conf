# PathWise AI — Redis 7 Configuration
# Used as pub/sub message broker for inter-service events

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (AOF for durability)
appendonly yes
appendfsync everysec

# Network
bind 0.0.0.0
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Logging
loglevel notice
