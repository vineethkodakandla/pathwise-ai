components:
  schemas:
    AlertConfigRequest:
      properties:
        threshold:
          anyOf:
          - type: number
          - type: 'null'
          title: Threshold
        suppression_window_s:
          anyOf:
          - type: number
          - type: 'null'
          title: Suppression Window S
      type: object
      title: AlertConfigRequest
    ApplyRuleRequest:
      properties:
        sandbox_report_id:
          type: string
          title: Sandbox Report Id
        source_link:
          type: string
          title: Source Link
        target_link:
          type: string
          title: Target Link
        traffic_classes:
          items:
            type: string
          type: array
          title: Traffic Classes
      type: object
      required:
      - sandbox_report_id
      - source_link
      - target_link
      - traffic_classes
      title: ApplyRuleRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    IntentRequest:
      properties:
        text:
          type: string
          title: Text
      type: object
      required:
      - text
      title: IntentRequest
    LSTMToggleRequest:
      properties:
        enabled:
          type: boolean
          title: Enabled
      type: object
      required:
      - enabled
      title: LSTMToggleRequest
    LoginRequest:
      properties:
        email:
          type: string
          title: Email
        password:
          type: string
          title: Password
      type: object
      required:
      - email
      - password
      title: LoginRequest
    RegisterRequest:
      properties:
        email:
          type: string
          title: Email
        password:
          type: string
          title: Password
        role:
          type: string
          title: Role
      type: object
      required:
      - email
      - password
      - role
      title: RegisterRequest
    SandboxValidationRequest:
      properties:
        source_link:
          type: string
          title: Source Link
        target_link:
          type: string
          title: Target Link
        traffic_classes:
          items:
            type: string
          type: array
          title: Traffic Classes
      type: object
      required:
      - source_link
      - target_link
      - traffic_classes
      title: SandboxValidationRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
