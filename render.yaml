# Render Blueprint — deploys the PathWise AI FastAPI backend in sim mode.
# Deploy: push this repo to GitHub, then on render.com → New + → Blueprint →
# select this repo. Render reads this file and provisions the service.
# Free tier supports WebSockets; the instance sleeps after ~15 min idle and
# cold-starts (~30-50s) on the next request — the frontend handles this gracefully.
services:
  - type: web
    name: pathwise-ai-api
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements-cloud.txt"
    startCommand: "uvicorn server.main:app --host 0.0.0.0 --port $PORT --workers 1"
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATA_SOURCE
        value: sim
      - key: SEED_DEMO_DATA
        value: "true"
      # Generated once by Render and kept stable across restarts:
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
